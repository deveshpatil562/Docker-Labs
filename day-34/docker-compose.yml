version: "3.9"

services:
  web:
    build: ./web
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=mysql+pymysql://root:rootpassword@db:3306/mydb
      - REDIS_URL=redis://cache:6379/0 
    depends_on:
      - db
      - cache

  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: mydb  
    volumes:
      - db_data:/var/lib/mysql

  cache:
    image: redis:7
    restart: always

volumes:
  db_data:
          
